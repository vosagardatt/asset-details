<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asset Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --o: #FF6B00; --b: #000; --w: #FFF; }
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Outfit', sans-serif; 
            background: #eef2f5; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 15px; 
            overflow: hidden; 
        }
        .bg { position: fixed; inset: 0; z-index: -1; filter: blur(100px); }
        .blob { position: absolute; border-radius: 50%; opacity: 0.3; animation: m 15s infinite alternate; }
        @keyframes m { to { transform: translate(50px, 50px); } }
        
        .card { 
            width: 100%; 
            max-width: 480px; 
            background: rgba(255,255,255,0.4); 
            backdrop-filter: blur(50px); 
            -webkit-backdrop-filter: blur(50px); 
            border: 2px solid rgba(255,255,255,0.6); 
            border-radius: 40px; 
            padding: 30px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.1); 
        }
        
        header { 
            display: flex; 
            justify-content: center; 
            margin-bottom: 25px; 
            padding-bottom: 20px; 
            border-bottom: 1px solid rgba(0,0,0,0.1); 
        }
        header img { height: 55px; width: auto; }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        .i { 
            background: rgba(255,255,255,0.3); 
            padding: 18px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.5); 
        }
        .full { grid-column: 1 / -1; }
        
        label { 
            font-size: 10px; 
            color: var(--o); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-weight: 700; 
            display: block; 
            margin-bottom: 4px; 
        }
        .v { 
            font-size: 16px; 
            color: var(--b); 
            line-height: 1.3; 
            font-weight: 400;
        }

        @media (max-width: 400px) {
            .card { padding: 20px; border-radius: 30px; }
            .v { font-size: 15px; }
            .i { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="bg">
        <div class="blob" style="width:500px; height:500px; background:var(--o); top:-10%; right:-5%;"></div>
        <div class="blob" style="width:400px; height:400px; background:var(--b); bottom:-10%; left:-5%;"></div>
    </div>
    
    <div class="card">
        <header>
            <img src="https://virtualops.net/wp-content/uploads/2022/12/logo-dark.png" alt="Logo">
        </header>
        
        <div class="grid" id="content">
            <div class="i"><label>Asset ID</label><div class="v" id="assetId"></div></div>
            <div class="i"><label>Assignee</label><div class="v" id="assigneeName"></div></div>
            <div class="i"><label>Department</label><div class="v" id="department"></div></div>
            <div class="i"><label>System Type</label><div class="v" id="systemType"></div></div>
            <div class="i full"><label>System Configuration</label><div class="v" id="systemConfiguration"></div></div>
            <div class="i full"><label>Remarks</label><div class="v" id="remarks"></div></div>
        </div>
    </div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch('assets.json')
  .then(response => response.json())
  .then(data => {
    const asset = data.find(item => item.assetId === id);

    if(asset){
      document.getElementById("assetId").innerText = asset.assetId || "-";
      document.getElementById("assigneeName").innerText = asset.assigneeName || "-";
      document.getElementById("department").innerText = asset.department || "-";
      document.getElementById("systemType").innerText = asset.systemType || "-";
      document.getElementById("systemConfiguration").innerText = asset.systemConfiguration || "-";
      document.getElementById("remarks").innerText = asset.remarks || "No remarks";
    } else {
      document.getElementById("content").innerHTML = 
      "<div class='full' style='text-align:center; padding:40px 0;'><h2>Asset Not Found</h2></div>";
    }
  })
  .catch(error => {
    console.error(error);
    document.getElementById("content").innerHTML = 
    "<div class='full' style='text-align:center; padding:40px 0;'><h2>Data Load Error</h2></div>";
  });
</script>
</body>
</html>
