<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asset Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --o: #FF6B00; --b: #000; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: #eef2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 10px; overflow: hidden; }
        .bg { position: fixed; inset: 0; z-index: -1; filter: blur(60px); }
        .blob { position: absolute; border-radius: 50%; opacity: 0.2; animation: m 10s infinite alternate; }
        @keyframes m { to { transform: translate(20px, 20px); } }
        .card { width: 100%; max-width: 400px; background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid #fff; border-radius: 25px; padding: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        header { display: flex; justify-content: center; margin-bottom: 12px; }
        header img { height: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .i { background: rgba(255,255,255,0.4); padding: 10px 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.5); }
        .full { grid-column: 1 / -1; }
        label { font-size: 8px; color: var(--o); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; display: block; }
        .v { font-size: 14px; color: var(--b); font-weight: 400; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="bg">
        <div class="blob" style="width:250px; height:250px; background:var(--o); top:0; right:0;"></div>
        <div class="blob" style="width:200px; height:200px; background:var(--b); bottom:0; left:0;"></div>
    </div>
    <div class="card">
        <header><img src="https://virtualops.net/wp-content/uploads/2022/12/logo-dark.png" alt="Logo"></header>
        <div class="grid" id="out">
            <div class="i"><label>Asset ID</label><div class="v" id="assetId"></div></div>
            <div class="i"><label>Assignee</label><div class="v" id="assigneeName"></div></div>
            <div class="i"><label>Department</label><div class="v" id="department"></div></div>
            <div class="i"><label>System Type</label><div class="v" id="systemType"></div></div>
            <div class="i full"><label>Configuration</label><div class="v" id="systemConfiguration"></div></div>
            <div class="i full"><label>Remarks</label><div class="v" id="remarks"></div></div>
        </div>
    </div>
<script>
    const id = new URLSearchParams(window.location.search).get("id");
    fetch('assets.json').then(r => r.json()).then(data => {
        const a = data.find(i => i.assetId.trim() === id.trim());
        if(a) {
            Object.keys(a).forEach(k => { if(document.getElementById(k)) document.getElementById(k).innerText = a[k] || "-"; });
        } else {
            document.getElementById("out").innerHTML = "<div class='full' style='text-align:center;padding:20px'>Asset Not Found</div>";
        }
    }).catch(() => document.getElementById("out").innerHTML = "<div class='full' style='text-align:center;padding:20px'>Error Loading</div>");
</script>
</body>
</html>
